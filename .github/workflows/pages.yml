name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Initialize search index
        run: bundle exec just-the-docs rake search:init

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Copy raw markdown files
        run: |
          mkdir -p _site/raw/skills/ask/references/{beginner,intermediate,expert}
          strip_frontmatter() {
            awk '
              NR == 1 && $0 != "---" { print; next }
              NR == 1 && $0 == "---" { in_front = 1; next }
              in_front && $0 == "---" { in_front = 0; next }
              in_front { next }
              { print }
            ' "$1" > "_site/raw/$1"
          }
          for f in skills/ask/references/beginner/*.md; do strip_frontmatter "$f"; done
          for f in skills/ask/references/intermediate/*.md; do strip_frontmatter "$f"; done
          for f in skills/ask/references/expert/*.md; do strip_frontmatter "$f"; done
          for f in skills/ask/references/*.md; do strip_frontmatter "$f"; done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
